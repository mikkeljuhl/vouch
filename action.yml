name: 'vouch — run API tests'
description: 'Run vouch API tests in the runner image (Bun + the framework), with JUnit, inline annotations, and a job summary.'
branding:
  icon: 'check-circle'
  color: 'green'

# Docker container action: builds the same Dockerfile that produces the published
# runner image, so the action and `docker run` are one path. Linux runners only.
# Test files import the framework by name (`@mikkeljuhl/vouch`); the entrypoint
# symlinks it into the workspace so the import resolves.
inputs:
  paths:
    description: 'Test paths/globs to run (default: all discovered tests).'
    required: false
    default: ''
  junit-file:
    description: 'JUnit output path, relative to the workspace.'
    required: false
    default: 'reports/junit.xml'

runs:
  using: 'docker'
  image: 'Dockerfile'
  env:
    INPUT_PATHS: ${{ inputs.paths }}
    INPUT_JUNIT_FILE: ${{ inputs.junit-file }}
