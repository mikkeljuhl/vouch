name: CI

# Repo-local CI that DOGFOODS the packaged composite action (`uses: ./`) to run
# the framework's own suite — so green CI also verifies the action consumers use.
on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The composite action (action.yml) does: setup-bun → install → typecheck
      # → bun test (JUnit) → inline annotations + job summary.
      - uses: ./
        with:
          typecheck: 'true'
