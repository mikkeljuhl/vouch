name: CI

# Dogfoods the Docker action (`uses: ./`, built from the Dockerfile) to run the
# suite, so green CI verifies the same action + image consumers use. Typecheck
# runs natively (Bun transpiles + type-strips but never type-checks).
on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Builds the Dockerfile and runs the suite via the entrypoint
      # (JUnit -> annotations + job summary).
      - uses: ./

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
