name: CI

# Repo-local CI for the framework's own dogfood suite. Runs under Bun (the
# default runner). A packaged reusable workflow/action stays deferred
# (DESIGN.md §10) — this runs OUR tests only.
on:
  pull_request:

# Annotations and the job summary need no extra scopes (they're log commands and
# a file write). Keep the token least-privileged.
permissions:
  contents: read

jobs:
  test:
    name: Test (Bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      # The suite hits a live public API (jsonplaceholder). Emit JUnit XML for
      # the summary/annotation step.
      - name: Test
        run: bun test --reporter=junit --reporter-outfile=reports/junit.xml

      # Parse the JUnit XML into inline annotations + a Markdown job summary.
      # Runs even when tests fail (the report is written regardless); the job
      # still fails because the Test step failed.
      - name: Job summary + annotations
        if: always()
        run: bun scripts/ci-summary.mjs reports/junit.xml
